<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README</title>
    <script src="math-config.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/extra.css">
</head>
<body>
    <div id="nav-placeholder"></div>
    <article class="markdown-body">
        <h1 id="utilities">Utilities</h1>
        <p>This folder contains the source TeX files used to generate plenty of the images in this book.</p>
        <h2 id="index">Index</h2>
        <p>This section contains a description for every file created.</p>
        <table aria-label="Data table generated by Pandoc" data-summary="Data table generated by Pandoc" style="margin-left: auto; margin-right: auto; border-collapse: collapse;">
            <colgroup>
                <col style="width: 11%">
                <col style="width: 40%">
                <col style="width: 47%">
            </colgroup>
            <thead>
                <tr class="header">
                    <th>Filename</th>
                    <th>Description</th>
                    <th>Used in</th>
                </tr>
            </thead>
            <tbody>
                <tr class="odd">
                    <td>long-div.tex</td>
                    <td>Long division operation fully worked out.</td>
                    <td>
                        <a href="../0-Prologue/2-Operations.html">0.2: Operations</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <hr>
        <hr>
    </article>
    <script>
        // Fetch and inject the navigation menu
        fetch('/math-book-web/util/nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            });

        // Navigation Toggle Logic
        function openNav() {
            document.getElementById("side-menu").style.width = "250px";
        }
        function closeNav() {
            document.getElementById("side-menu").style.width = "0";
        }
    </script>
</body>
</html>
